<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecture Camera</title>
    <style>
        :root { 
            --shutter-size: 70px; 
            --bar-height: 120px;
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; background: #000; color: white; 
            font-family: -apple-system, sans-serif;
            overflow: hidden; 
            /* dvh = 動的な画面の高さ（アドレスバーを除いた高さ） */
            height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column;
        }

        /* カメラ表示エリア */
        .video-container {
            flex: 1; /* 余ったスペースをすべて使う */
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 映像を歪ませず画面内に収める */
        }

        /* 下部操作パネル */
        .controls {
            height: var(--bar-height);
            flex-shrink: 0; /* 画面外に押し出されないように固定 */
            background: rgba(20, 20, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneの下線バー対策 */
            z-index: 10;
        }

        /* シャッターボタン */
        #shutter {
            width: var(--shutter-size);
            height: var(--shutter-size);
            background: white;
            border-radius: 50%;
            border: 5px solid #444;
            cursor: pointer;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #shutter:active { background: #bbb; transform: scale(0.95); }

        /* サムネイル */
        #thumb-box {
            width: 50px; height: 50px;
            border-radius: 6px;
            background: #333;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #thumbnail { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* プレビュー画面（オーバーレイ） */
        #preview-overlay {
            position: fixed;
            inset: 0; /* 全画面 */
            background: #000;
            display: none;
            flex-direction: column;
            z-index: 100;
        }
        #full-image { flex: 1; object-fit: contain; width: 100%; height: 100%; }

        .preview-tools {
            height: var(--bar-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            padding-bottom: env(safe-area-inset-bottom);
            background: #111;
        }

        .btn-text { color: #007aff; font-size: 17px; background: none; border: none; font-weight: 600; }
        
        /* 共有ボタンのアイコン */
        .share-icon {
            width: 20px; height: 20px; border: 2px solid #007aff;
            position: relative;
        }
        .share-icon::after {
            content: '↑'; position: absolute; top: -12px; left: 1px; width: 15px; color: #007aff; font-weight: bold; text-align: center;
        }

        /* フラッシュ */
        #flash {
            position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 5;
        }
        .flash-active { animation: flash-anim 0.2s; }
        @keyframes flash-anim { 0% { opacity: 0.7; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div class="controls">
        <div id="thumb-box">
            <img id="thumbnail">
        </div>
        <button id="shutter"></button>
        <div style="width: 50px;"></div> <!-- バランス用空要素 -->
    </div>

    <!-- プレビュー表示層 -->
    <div id="preview-overlay">
        <img id="full-image">
        <div class="preview-tools">
            <button class="btn-text" id="close-preview">完了</button>
            <button class="btn-text" id="share-btn">
                <div class="share-icon"></div>
            </button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutter = document.getElementById('shutter');
        const thumbnail = document.getElementById('thumbnail');
        const previewOverlay = document.getElementById('preview-overlay');
        const fullImage = document.getElementById('full-image');
        const closePreview = document.getElementById('close-preview');
        const shareBtn = document.getElementById('share-btn');
        const flash = document.getElementById('flash');

        let currentBlob = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラを起動できません。設定からブラウザのカメラ許可をオンにしてください。");
            }
        }

        shutter.addEventListener('click', () => {
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                currentBlob = blob;
                const url = URL.createObjectURL(blob);
                thumbnail.src = url;
                thumbnail.style.display = 'block';
                fullImage.src = url;
            }, 'image/jpeg', 0.9);
        });

        document.getElementById('thumb-box').addEventListener('click', () => {
            if (fullImage.src) previewOverlay.style.display = 'flex';
        });

        closePreview.addEventListener('click', () => {
            previewOverlay.style.display = 'none';
        });

        shareBtn.addEventListener('click', async () => {
            if (!currentBlob) return;
            const file = new File([currentBlob], `board_${Date.now()}.jpg`, { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file] });
                } catch (e) {}
            } else {
                const link = document.createElement('a');
                link.href = fullImage.src;
                link.download = file.name;
                link.click();
            }
        });

        initCamera();
    </script>
</body>
</html>
