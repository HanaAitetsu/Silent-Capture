<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Camera</title>
    <style>
        /* 画面全体のスクロールを完全に禁止 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            position: fixed; /* ボディを固定してスクロールを物理的に不可能にする */
            background: #000;
        }

        /* カメラ映像を画面全体に配置（下部のボタンに重なるように背景として置く） */
        .video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            /* ボタンエリア(120px)を除いた範囲に映像を表示 */
            height: calc(100% - 120px); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #video {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        /* 操作パネルを「画面の底」に完全に固定 */
        .controls {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 120px; /* 固定高 */
            background: rgba(15, 15, 15, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); /* iPadのバー対策 */
            z-index: 100;
        }

        #shutter {
            width: 75px; height: 75px;
            background: white;
            border-radius: 50%;
            border: 5px solid #555;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #shutter:active { background: #ccc; transform: scale(0.95); }

        #thumb-box {
            width: 55px; height: 55px;
            background: #333; border-radius: 4px; overflow: hidden;
            border: 1px solid #666;
        }
        #thumbnail { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* プレビュー表示 */
        #preview-overlay {
            position: fixed; inset: 0;
            background: #000; display: none; flex-direction: column; z-index: 200;
        }
        #full-image { flex: 1; min-height: 0; object-fit: contain; }
        .preview-tools {
            height: 100px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: #111; padding-bottom: env(safe-area-inset-bottom);
        }
        .btn-text { color: #007aff; font-size: 18px; background: none; border: none; font-weight: bold; }

        #flash {
            position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 150;
        }
        .flash-active { animation: flash-anim 0.2s; }
        @keyframes flash-anim { 0% { opacity: 0.6; } 100% { opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- 右クリックメニュー禁止（誤操作防止） -->

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="flash"></div>
    
    <div class="controls">
        <div id="thumb-box">
            <img id="thumbnail">
        </div>
        <button id="shutter"></button>
        <div style="width: 55px;"></div> 
    </div>

    <div id="preview-overlay">
        <img id="full-image">
        <div class="preview-tools">
            <button class="btn-text" id="close-preview">完了</button>
            <button class="btn-text" id="share-btn">共有</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutter = document.getElementById('shutter');
        const thumbnail = document.getElementById('thumbnail');
        const previewOverlay = document.getElementById('preview-overlay');
        const fullImage = document.getElementById('full-image');
        const closePreview = document.getElementById('close-preview');
        const shareBtn = document.getElementById('share-btn');
        const flash = document.getElementById('flash');

        let currentBlob = null;

        // スクロールをJSでも禁止（iPadのバウンド対策）
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1 || !previewOverlay.contains(e.target)) {
                e.preventDefault();
            }
        }, { passive: false });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラの起動に失敗しました。Safariの設定でカメラを許可してください。");
            }
        }

        shutter.addEventListener('click', () => {
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                currentBlob = blob;
                const url = URL.createObjectURL(blob);
                thumbnail.src = url;
                thumbnail.style.display = 'block';
                fullImage.src = url;
            }, 'image/jpeg', 0.9);
        });

        document.getElementById('thumb-box').addEventListener('click', () => {
            if (fullImage.src) previewOverlay.style.display = 'flex';
        });

        closePreview.addEventListener('click', () => {
            previewOverlay.style.display = 'none';
        });

        shareBtn.addEventListener('click', async () => {
            if (!currentBlob) return;
            const file = new File([currentBlob], `board_${Date.now()}.jpg`, { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file] });
                } catch (e) {}
            } else {
                window.open(fullImage.src, '_blank');
            }
        });

        initCamera();
    </script>
</body>
</html>
