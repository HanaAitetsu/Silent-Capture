<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecture Camera (iPad Optimized)</title>
    <style>
        :root { 
            --bar-height: 100px; /* ボタンエリアの高さを少し抑えて確実に収める */
            --shutter-size: 65px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: #000; color: white; 
            font-family: -apple-system, sans-serif;
            overflow: hidden; 
            /* 画面の高さを厳密に指定 */
            height: 100vh; height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        /* 1. ビデオ表示エリア：ここが重要 */
        .video-container {
            flex: 1;          /* 余ったスペースを埋める */
            min-height: 0;    /* ★重要：中身（ビデオ）が大きくてもこの要素自体は縮めるようにする */
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 映像がどれだけ大きくても枠内に収める */
        }

        /* 2. 下部操作パネル：高さを固定して死守する */
        .controls {
            height: var(--bar-height);
            min-height: var(--bar-height); /* 強制的に高さを確保 */
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid #333;
            z-index: 20;
        }

        #shutter {
            width: var(--shutter-size);
            height: var(--shutter-size);
            background: white;
            border-radius: 50%;
            border: 4px solid #888;
            cursor: pointer;
            padding: 0;
        }
        #shutter:active { background: #bbb; transform: scale(0.92); }

        #thumb-box {
            width: 50px; height: 50px;
            border-radius: 4px;
            background: #333;
            overflow: hidden;
            border: 1px solid #666;
        }
        #thumbnail { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* プレビュー画面 */
        #preview-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            z-index: 100;
        }
        #full-image { flex: 1; min-height: 0; object-fit: contain; }

        .preview-tools {
            height: var(--bar-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            padding-bottom: env(safe-area-inset-bottom);
            background: #111;
        }

        .btn-text { color: #007aff; font-size: 18px; background: none; border: none; font-weight: bold; }

        #flash {
            position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 10;
        }
        .flash-active { animation: flash-anim 0.2s; }
        @keyframes flash-anim { 0% { opacity: 0.6; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="flash"></div>
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div class="controls">
        <div id="thumb-box">
            <img id="thumbnail">
        </div>
        <button id="shutter"></button>
        <div style="width: 50px;"></div> 
    </div>

    <div id="preview-overlay">
        <img id="full-image">
        <div class="preview-tools">
            <button class="btn-text" id="close-preview">完了</button>
            <button class="btn-text" id="share-btn">共有</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutter = document.getElementById('shutter');
        const thumbnail = document.getElementById('thumbnail');
        const previewOverlay = document.getElementById('preview-overlay');
        const fullImage = document.getElementById('full-image');
        const closePreview = document.getElementById('close-preview');
        const shareBtn = document.getElementById('share-btn');
        const flash = document.getElementById('flash');

        let currentBlob = null;

        async function initCamera() {
            try {
                // iPadの広角・超広角など複数を考慮しつつ背面カメラを指定
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラにアクセスできません。設定を確認してください。");
            }
        }

        shutter.addEventListener('click', () => {
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                currentBlob = blob;
                const url = URL.createObjectURL(blob);
                thumbnail.src = url;
                thumbnail.style.display = 'block';
                fullImage.src = url;
            }, 'image/jpeg', 0.9);
        });

        document.getElementById('thumb-box').addEventListener('click', () => {
            if (fullImage.src) previewOverlay.style.display = 'flex';
        });

        closePreview.addEventListener('click', () => {
            previewOverlay.style.display = 'none';
        });

        shareBtn.addEventListener('click', async () => {
            if (!currentBlob) return;
            const file = new File([currentBlob], `shot_${Date.now()}.jpg`, { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file] });
                } catch (e) {}
            } else {
                // 共有が使えない場合のバックアップ（画像表示）
                window.open(fullImage.src, '_blank');
            }
        });

        initCamera();
    </script>
</body>
</html>
